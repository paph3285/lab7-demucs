apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  selector:
    matchLabels:
      app: minio
  replicas: 1
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
          - server
          - /data
        env:
          - name: MINIO_ROOT_USER
            value: "rootuser"
          - name: MINIO_ROOT_PASSWORD
            value: "rootpass123"
        ports:
          - containerPort: 9000
        resources:
          requests:
            memory: "512Mi"
